name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # build with the toolchain pinned in go.mod
      - run: go vet ./...
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go build ./...
      - run: go test ./...

  vuln:
    runs-on: ubuntu-latest
    # Informational: breaker has zero third-party deps, so any finding is a Go
    # stdlib advisory. A red result means "bump the Go toolchain", not a bug in
    # our code — so it must not block the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
